name: ScatchLM
options:
  bundleIdPrefix: com.joho54
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  # 소스 언어 = 한국어. String Catalog(Localizable.xcstrings) 자동추출의 기준 로케일.
  developmentLanguage: ko

# UI 국제화(eng-localization-infra-spec): 빌드 시 String Catalog(Localizable.xcstrings)가
# 모든 LocalizedStringKey / String(localized:) 사용처를 자동추출(소스 ko, 현재 147개).
#
# en 번역은 의도적으로 미포함(§0 out-of-scope). 영어 추가는 Xcode에서 카탈로그에 English
# 컬럼을 더하고 번역 값만 채우면 되는 "몇 시간" 작업 — 그 순간 빌드가 en loctable을 산출하고
# Xcode가 en을 knownRegions에 자동 등록한다. 그 전까지는 번역이 없어 ko로 fallback(안 깨짐).
#
# 그래서 지금 번들에는 로케일 산출물(.lproj/.loctable)이 없는 게 정상이다: 유일 언어가
# 개발 언어(ko)면 소스 문자열이 곧 키라 별도 테이블이 필요 없다.
# (§6.x-1 검증: INFOPLIST_KEY_CFBundleLocalizations는 Xcode 자동승격 키 목록에 없어 무시됨 →
#  GENERATE_INFOPLIST_FILE 유지를 위해 채택하지 않음. en 선언은 카탈로그 경유가 정답.)

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: "2.0.0"
  # Sentry: 정식 통합은 sentry-cocoa SPM(아래)이나, xcodebuild가 바이너리 XCFramework
  # 다운로드(BinaryArtifactsManager.download)에서 데드락하는 환경 이슈로 archive가 불가.
  # → 동일 SDK(8.58.3 static)를 로컬 XCFramework로 벤더링(Vendor/Sentry.xcframework, iOS 슬라이스만).
  # 환경 이슈 해소되면 아래 SPM 블록 + dependencies의 package:Sentry로 복구 가능.
  # Sentry:
  #   url: https://github.com/getsentry/sentry-cocoa.git
  #   from: "8.0.0"

targets:
  ScatchLM:
    type: application
    platform: iOS
    sources:
      - ScatchLM
      - Shared
      - path: WebAssets
        type: folder
        buildPhase: resources
    # 위젯 딥링크 URL scheme(scatchlm://). GENERATE_INFOPLIST_FILE=YES와 병행 — Xcode가
    # 이 plist를 베이스로 자동생성 키를 머지한다(CFBundleURLTypes는 INFOPLIST_KEY 미지원이라 파일 경유).
    info:
      path: ScatchLM/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.joho54.scatchlm
            CFBundleURLSchemes:
              - scatchlm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joho54.scatchlm
        DEVELOPMENT_TEAM: Z5U7D89KP7
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        # Swift 코드의 LocalizedStringKey/String(localized:) 사용처를 빌드 시 .stringsdata로 추출
        # → String Catalog 자동 채움(xcstringstool sync) 가능. 미설정 시 추출 안 됨.
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
        MARKETING_VERSION: "2.4.0"
        # CFBundleVersion(빌드 번호)는 아래 postBuildScript가 git 커밋 수로 덮어쓴다.
        # 이 값은 fallback(스크립트 실패 시)일 뿐 — 평소엔 MARKETING_VERSION만 손으로 올리면 된다.
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # iPhone 컴패니언(iphone-companion-app-spec §4.6): portrait 전용 — 읽기 전용 단일 컬럼.
        # 가로 분할 레이아웃 미고려(§4.1) → AppDelegate idiom 분기와 함께 portrait 락 모순 해소.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # Universal 단일 타겟 — iPhone(1) + iPad(2). 같은 번들·App Store 리스팅(§1.3-1).
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-lc++"   # 벤더 Sentry.xcframework(정적)가 요구하는 libc++ (SPM SentryCppHelper 대체)
    # 빌드 번호(CFBundleVersion)를 git 커밋 수로 자동 주입.
    # Process Info.plist 이후·코드 서명 이전(= postBuildScript 시점)에 빌드 산출물 plist를
    # 직접 덮어써야 안전하다. preBuildScript는 Process Info.plist보다 먼저라 덮어써진다.
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          set -e
          n=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo "")
          if [ -z "$n" ]; then echo "warning: git unavailable, keeping CURRENT_PROJECT_VERSION"; exit 0; fi
          plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $n" "$plist"
          echo "Set CFBundleVersion=$n in $plist"
    entitlements:
      path: ScatchLM/ScatchLM.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.joho54.scatchlm
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GRDB
        product: GRDB
      - package: MarkdownUI
        product: MarkdownUI
      # - package: Sentry      # (위 주석 참고) 환경 이슈 해소 시 복구
      #   product: Sentry
      - framework: Vendor/Sentry.xcframework
        embed: false           # 정적 라이브러리 → 임베드 안 함
      - target: ScatchLMWidgetExtension
        embed: true            # 위젯 익스텐션을 앱 PlugIns에 임베드

  ScatchLMWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - ScatchLMWidget
      - Shared
    info:
      path: ScatchLMWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joho54.scatchlm.widget
        DEVELOPMENT_TEAM: Z5U7D89KP7
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        # 앱과 버전 일치 필수(임베드 익스텐션 검증). MARKETING_VERSION은 앱과 동일하게,
        # CFBundleVersion은 아래 postBuildScript가 앱과 같은 git 커밋 수로 덮어쓴다.
        MARKETING_VERSION: "2.4.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: ScatchLM
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          set -e
          n=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo "")
          if [ -z "$n" ]; then echo "warning: git unavailable, keeping CURRENT_PROJECT_VERSION"; exit 0; fi
          plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $n" "$plist"
          echo "Set CFBundleVersion=$n in $plist"
    entitlements:
      path: ScatchLMWidget/ScatchLMWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.joho54.scatchlm
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  ScatchLMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ScatchLMTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ScatchLM
      - package: GRDB
        product: GRDB

schemes:
  ScatchLM:
    build:
      targets:
        ScatchLM: all
        ScatchLMTests: [test]
    run:
      config: Debug
      # 로컬 StoreKit 테스트 설정 — 시뮬레이터에서 구독 상품/가격(₩9,900) 로드용.
      # 심사 스크린샷·샌드박스 전 동작 확인(C-3). Release/TestFlight·기기 빌드엔 영향 없음.
      storeKitConfiguration: ScatchLM.storekit
    test:
      config: Debug
      targets:
        - ScatchLMTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
