name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/joho54/scatchlm-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # VM 측 설정(compose/Caddyfile/static)을 repo 기준으로 동기화.
      # 이 파일들은 app 이미지가 아니라 VM 볼륨 마운트라 pull로는 갱신되지 않는다 → git이 single source of truth.
      # .env.prod(시크릿)는 의도적으로 제외 — VM에서 수동 관리.
      - name: Sync VM config from repo
        uses: appleboy/scp-action@v0.1.7
        with:
          # 고정 공인 IP 직결 — 러너의 DuckDNS DNS 조회(i/o timeout)로 배포가 죽던 문제 회피.
          host: 101.79.20.91
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          source: "backend/docker-compose.prod.yml,backend/Caddyfile,backend/static"
          target: "/opt/scatchlm"
          strip_components: 1
          overwrite: true

      - name: Pull & restart on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          # 고정 공인 IP 직결 — DuckDNS DNS 조회 의존 제거(위 scp와 동일 이유).
          host: 101.79.20.91
          username: root
          key: ${{ secrets.NCP_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/scatchlm
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull app
            # up -d (전체): compose/볼륨 마운트가 바뀐 컨테이너(예: caddy)만 재생성. app은 새 이미지로 교체.
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            # Caddyfile '내용'만 바뀐 경우 컨테이너는 재생성 안 되므로 무중단 reload로 반영. 실패 시 restart로 폴백.
            docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T caddy \
              caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \
              || docker compose -f docker-compose.prod.yml --env-file .env.prod restart caddy
            docker image prune -af

      - name: Health check
        run: |
          # app 프록시(/docs) + Caddy 정적 서빙(/privacy,/terms, 심사 차단 아티팩트)을 모두 검증.
          # Micro(1 vCPU) 서버는 재시작 후 uvicorn 워커 부팅이 ~40-60초 걸려 50초 윈도우로는
          # 성공 배포도 오탐 실패가 났다 → 20회 × 6초 = 120초로 확대.
          for i in $(seq 1 20); do
            if curl -fsS https://scatchlm.duckdns.org/docs > /dev/null \
               && curl -fsS https://scatchlm.duckdns.org/privacy > /dev/null \
               && curl -fsS https://scatchlm.duckdns.org/terms > /dev/null; then
              echo "Healthy (app + static)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 6s..."
            sleep 6
          done
          echo "Health check failed"
          exit 1
