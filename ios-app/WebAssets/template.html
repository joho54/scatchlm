<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=__WIDTH__, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="katex/katex.min.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: __FONT_SIZE__px;
    line-height: 1.5;
    color: #1a1a1a;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e8e8e8; }
  }
  #content > :first-child { margin-top: 0; }
  #content > :last-child { margin-bottom: 0; }
  p { margin: 0.5em 0; }
  ul, ol { margin: 0.5em 0; padding-left: 1.4em; }
  li { margin: 0.2em 0; }
  code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    background: rgba(127,127,127,0.15);
    padding: 0.1em 0.3em;
    border-radius: 4px;
  }
  pre {
    background: rgba(127,127,127,0.12);
    padding: 0.7em;
    border-radius: 8px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; }
  blockquote {
    margin: 0.5em 0;
    padding-left: 0.8em;
    border-left: 3px solid rgba(127,127,127,0.4);
    color: rgba(127,127,127,1);
  }
  img { max-width: 100%; height: auto; }
  a { color: #3478f6; }
  del { opacity: 0.6; }
  table { border-collapse: collapse; }
  th, td { border: 1px solid rgba(127,127,127,0.3); padding: 0.3em 0.6em; }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 2px 0; margin: 0.6em 0; }
  .katex { font-size: 1.05em; }
</style>
</head>
<body>
<div id="content"></div>
<script src="marked.min.js"></script>
<script src="katex/katex.min.js"></script>
<script src="marked-katex-extension.umd.js"></script>
<script>
  (function () {
    function postHeight() {
      var h = Math.ceil(document.body.getBoundingClientRect().height);
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.heightChanged) {
        window.webkit.messageHandlers.heightChanged.postMessage(h);
      }
    }

    // 스냅샷(굽기) 전용: 폰트 로드 + 2프레임 후 "렌더 완료"를 알린다. 핸들러가 없으면(일반 표시
    // 경로) 무시되므로 기존 동작과 호환. 굽기 렌더러만 katexReady를 등록해 이 시점에 스냅샷한다.
    function postReady() {
      // body의 콘텐츠 높이. ※ scrollHeight/documentElement는 쓰지 말 것 — frame(20000px)나
      //   overflow를 끌어와 거대 이미지 → 메모리 폭발/튕김을 유발한다. 마지막 줄 잘림은 Swift에서
      //   고정 여유분(pad)으로 보정한다.
      var h = Math.ceil(document.body.getBoundingClientRect().height);
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.katexReady) {
        window.webkit.messageHandlers.katexReady.postMessage({
          h: h, iw: window.innerWidth, sw: document.body.scrollWidth
        });
      }
    }
    function signalReady() {
      requestAnimationFrame(function () { requestAnimationFrame(postReady); });
    }

    function render() {
      var raw;
      try {
        raw = decodeURIComponent(escape(window.atob("__CONTENT_B64__")));
      } catch (e) {
        raw = "";
      }
      var el = document.getElementById("content");
      try {
        // 수식($…$ / $$…$$)을 marked 렉서 단계에서 토큰으로 잡아 KaTeX로 렌더한다.
        // marked가 수식 내부를 일반 텍스트로 escape(& → &amp;, \\ → \)하는 것을 원천 차단
        // → 행렬 행/열 구분자가 보존된다. 구분자는 $/$$ 로 통일(백엔드 프롬프트에서 지시).
        // nonStandard:true 는 한글이 수식에 바로 붙는 경우($x$를)도 인식하기 위함.
        marked.use(markedKatex({ throwOnError: false, nonStandard: true }));
        marked.setOptions({ gfm: true, breaks: true });
        el.innerHTML = marked.parse(raw);
      } catch (e) {
        el.textContent = raw;
      }

      postHeight();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(postHeight);
        document.fonts.ready.then(signalReady);   // 굽기: 폰트까지 끝난 뒤 스냅샷 신호.
      } else {
        signalReady();
      }
      if (window.ResizeObserver) {
        new ResizeObserver(postHeight).observe(document.body);
      } else {
        window.addEventListener("load", postHeight);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", render);
    } else {
      render();
    }
  })();
</script>
</body>
</html>
