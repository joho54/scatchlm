name: scatchlm-prod

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-scatchlm}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # 외부 노출 X. app 컨테이너만 접근

  app:
    image: "${APP_IMAGE:?APP_IMAGE env required}"
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # 컨테이너 내부 통신으로 DB URL 오버라이드
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scatchlm}?ssl=disable"
    volumes:
      - uploads:/app/uploads  # STORAGE_BACKEND=local 폴백용. s3면 사용 안 됨
    # 외부 노출 X. Caddy가 리버스 프록시

  # 백업 사이드카 — pg_dump/prune을 host cron이 아니라 여기서 스케줄(supercronic).
  # git-managed(이 compose가 scp 동기화)라 박스 재생성에도 `up -d`로 생존. 2026-06-18 백업
  # 소실(host crontab 미이관)의 구조적 재발 차단. 이미지는 :latest + pull_policy: always라
  # .env.prod 수정 없이 up -d가 자동 pull. 자격증명/엔드포인트는 .env.prod 재사용.
  backup:
    image: ghcr.io/joho54/scatchlm-backup:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      POSTGRES_HOST: postgres
      TZ: Asia/Seoul

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/srv/static:ro      # 약관/정책 정적 페이지 (G-1)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
